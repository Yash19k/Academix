<!DOCTYPE html>
<html>
<head>
    <title>{{ quiz.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #b993d6, #8ca6db);
            min-height: 100vh;
        }

        .quiz-card {
            max-width: 900px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .option-card {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-card:hover {
            border-color: #4f46e5;
            background: #f9fafb;
        }

        .option-card.selected {
            border-color: #4f46e5;
            background: #eef2ff;
        }

        .timer-box {
            background: #ffe5e5;
            color: #dc2626;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
        }

        .submit-btn {
            background: linear-gradient(to right, #4f46e5, #6366f1);
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            color: white;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        input[type="radio"] {
            display: none;
        }
    </style>
</head>
<body>

<div class="quiz-card">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>{{ quiz.title }}</h3>
        <div class="timer-box">
            <i class="bi bi-clock"></i>
            <span id="timer"></span>
        </div>
    </div>

    <form method="POST" action="/submit-module-quiz/{{ quiz.id }}" id="quizForm">

        {% for q in questions %}
        <div class="mb-4">
            <h5 class="mb-3">{{ loop.index }}. {{ q.question }}</h5>

            <label class="option-card">
                <input type="radio" name="question_{{ q.id }}" value="A">
                A. {{ q.option_a }}
            </label>

            <label class="option-card">
                <input type="radio" name="question_{{ q.id }}" value="B">
                B. {{ q.option_b }}
            </label>

            <label class="option-card">
                <input type="radio" name="question_{{ q.id }}" value="C">
                C. {{ q.option_c }}
            </label>

            <label class="option-card">
                <input type="radio" name="question_{{ q.id }}" value="D">
                D. {{ q.option_d }}
            </label>
        </div>
        {% endfor %}

        <div class="text-end">
            <button class="submit-btn">Submit Answer →</button>
        </div>
    </form>

</div>

<script>
let timeLeft = {{ quiz.time_limit }};
const timerElement = document.getElementById("timer");

// TIMER
function startTimer() {
    const interval = setInterval(() => {

        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;

        timerElement.innerText = minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

        timeLeft--;

        if (timeLeft < 0) {
            clearInterval(interval);
            document.getElementById("quizForm").submit();
        }

    }, 1000);
}
startTimer();

// Option selection highlight
document.querySelectorAll(".option-card").forEach(card => {
    card.addEventListener("click", function () {
        const group = this.querySelector("input").name;

        document.querySelectorAll("input[name='" + group + "']").forEach(input => {
            input.closest(".option-card").classList.remove("selected");
        });

        this.classList.add("selected");
        this.querySelector("input").checked = true;
    });
});
</script>

</body>
</html>
