<!DOCTYPE html>
<html>
<head>
    <title>Certificate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body {
            background: #f4f6fb;
            font-family: 'Inter', sans-serif;
        }

        .certificate-wrapper {
            display: flex;
            justify-content: center;
            padding: 40px 0;
        }

        .certificate {
            width: 1100px;
            background: #fdfaf4;
            padding: 70px;
            position: relative;
            border: 8px solid #1f4db8;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
        }

        /* Inner Golden Border */
        .certificate::before {
            content: "";
            position: absolute;
            inset: 15px;
            border: 3px solid #d4af37;
            pointer-events: none;
        }

        .cert-title {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            font-weight: 700;
            color: #1f4db8;
            text-align: center;
            letter-spacing: 3px;
        }

        .cert-subtitle {
            text-align: center;
            font-style: italic;
            margin-top: -10px;
            margin-bottom: 20px;
            color: #555;
        }

        .cert-text {
            text-align: center;
            font-size: 18px;
            margin-top: 20px;
        }

        .cert-name {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            text-align: center;
            margin: 20px 0;
            border-bottom: 2px solid #ccc;
            display: inline-block;
            padding-bottom: 10px;
        }

        .cert-course {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            color: #1f4db8;
            text-align: center;
            margin-top: 20px;
        }

        .badge-seal {
            width: 120px;
            height: 120px;
            background: #d4af37;
            border-radius: 50%;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 30px auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .signature-section {
            display: flex;
            justify-content: space-between;
            margin-top: 60px;
        }

        .signature {
            text-align: center;
            width: 40%;
        }

        .signature-name {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
        }

        .cert-footer {
            text-align: center;
            margin-top: 40px;
            font-size: 14px;
            color: #555;
        }

        .download-btn {
            display: block;
            margin: 30px auto;
            padding: 12px 30px;
            border-radius: 50px;
            background: #1f4db8;
            color: white;
            border: none;
        }

        /* Print Optimization */
        @media print {
            body {
                background: white;
            }
            .download-btn {
                display: none;
            }
        }
    </style>
</head>

<body>

<div class="certificate-wrapper">

    <div class="certificate">

        <!-- Title -->
        <div class="cert-title">CERTIFICATE</div>
        <div class="cert-subtitle">of Completion</div>

        <div class="cert-text">
            THIS IS TO CERTIFY THAT
        </div>

        <div style="text-align:center;">
            <div class="cert-name">
                {{ user.username }}
            </div>
        </div>

        <div class="cert-text">
            has successfully completed the premium curriculum for
        </div>

        <div class="cert-course">
            {{ course.title }}
        </div>

        <div class="badge-seal">
            VERIFIED
        </div>

        <!-- Signatures -->
        <div class="signature-section">
            <div class="signature">
                <div class="signature-name">Sarah Smith</div>
                <div>Lead Instructor</div>
            </div>

            <div class="signature">
                <div class="signature-name">James Anderson</div>
                <div>Platform Director</div>
            </div>
        </div>

        <!-- Footer -->
        <div class="cert-footer">
            Certificate ID: ACX-{{ user.id }}-{{ course.id }} <br>
        </div>

    </div>

</div>


<button class="download-btn" onclick="downloadCertificate()">
    ⬇ Download as PDF
</button>

<script>
function downloadCertificate() {
    window.print();
}
</script>

</body>
</html>
